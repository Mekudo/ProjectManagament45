<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управление задачами</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<div class="tasks-container">
    <!-- Заголовок и действия -->
    <div class="tasks-header">
        <h2><i class="fas fa-tasks"></i> Управление задачами</h2>
        <div class="tasks-actions">
            <button class="btn btn-primary" onclick="openCreateTaskModalFromTasks()">
                <i class="fas fa-plus"></i> Новая задача
            </button>
            <div class="filter-dropdown">
                <button class="btn btn-secondary filter-toggle" onclick="toggleFilterDropdownForTasks()">
                    <i class="fas fa-filter"></i> Фильтр
                </button>
                <div class="filter-content" id="filterContent">
                    <div class="filter-group">
                        <label>Проект:</label>
                        <select id="projectFilter" onchange="filterTasksForTasks()">
                            <option value="">Все проекты</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>Статус:</label>
                        <select id="statusFilter" onchange="filterTasksForTasks()">
                            <option value="">Все статусы</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>Исполнитель:</label>
                        <select id="executorFilter" onchange="filterTasksForTasks()">
                            <option value="">Все исполнители</option>
                        </select>
                    </div>
                    <div class="filter-actions">
                        <button class="btn btn-sm btn-secondary" onclick="resetFiltersForTasks()">Сбросить</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Таблица задач -->
    <div class="table-container">
        <div class="table-header">
            <div class="table-actions">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="taskSearch" placeholder="Поиск по названию..." onkeyup="searchTasksForTasks()">
                </div>
            </div>
        </div>

        <div class="table-wrapper">
            <table class="data-table" id="tasksTable">
                <thead>
                    <tr>
                        <th>Название</th>
                        <th>Проект</th>
                        <th>Исполнитель</th>
                        <th>Статус</th>
                        <th>Дедлайн</th>
                        <th>Действия</th>
                    </tr>
                </thead>
                <tbody id="tasksTableBody">
                    <tr class="loading-row">
                        <td colspan="6" class="loading-cell">
                            <div class="loading-spinner">
                                <i class="fas fa-spinner fa-spin"></i>
                                <span>Загрузка задач...</span>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>

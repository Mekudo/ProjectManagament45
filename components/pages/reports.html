<!-- reports.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="/project-management/ProjectManagement.Frontend/js/pages/reports.js" defer></script>
    
    <title>Отчеты и аналитика</title>
</head>
<body>
    <div class="reports-container">
        <!-- Заголовок и действия -->
        <div class="reports-header">
            <h2><i class="fas fa-chart-pie"></i> Отчеты и аналитика</h2>
            <div class="header-actions">
                <button class="btn btn-primary" onclick="openModal('export-pdf-wrapper')">
                    <i class="fas fa-file-pdf"></i> Экспорт
                </button>
                <button class="btn btn-secondary" onclick="openModal('select-period-wrapper')">
                    <i class="fas fa-calendar-alt"></i> Выбрать период
                </button>
            </div>
        </div>

        <!-- Карточки KPI с data-атрибутами -->
        <div class="kpi-grid">
            <div class="kpi-card" data-kpi="total-projects">
                <div class="kpi-icon" style="background: rgba(52, 152, 219, 0.1); color: #3498db;">
                    <i class="fas fa-project-diagram"></i>
                </div>
                <div class="kpi-content">
                    <div class="kpi-value">0</div>
                    <div class="kpi-label">Всего проектов</div>
                </div>
                <div class="kpi-trend up" style="display: none;">
                    <i class="fas fa-arrow-up"></i> <span class="trend-value"></span>
                </div>
            </div>
            
            <div class="kpi-card" data-kpi="completed-projects">
                <div class="kpi-icon" style="background: rgba(46, 204, 113, 0.1); color: #2ecc71;">
                    <i class="fas fa-check-circle"></i>
                </div>
                <div class="kpi-content">
                    <div class="kpi-value">0</div>
                    <div class="kpi-label">Завершено</div>
                </div>
                <div class="kpi-trend up" style="display: none;">
                    <i class="fas fa-arrow-up"></i> <span class="trend-value"></span>
                </div>
            </div>
            
            <div class="kpi-card" data-kpi="active-tasks">
                <div class="kpi-icon" style="background: rgba(241, 196, 15, 0.1); color: #f1c40f;">
                    <i class="fas fa-tasks"></i>
                </div>
                <div class="kpi-content">
                    <div class="kpi-value">0</div>
                    <div class="kpi-label">Активные задачи</div>
                </div>
                <div class="kpi-trend down" style="display: none;">
                    <i class="fas fa-arrow-down"></i> <span class="trend-value"></span>
                </div>
            </div>
            
            <div class="kpi-card" data-kpi="overdue-tasks">
                <div class="kpi-icon" style="background: rgba(231, 76, 60, 0.1); color: #e74c3c;">
                    <i class="fas fa-clock"></i>
                </div>
                <div class="kpi-content">
                    <div class="kpi-value">0</div>
                    <div class="kpi-label">Просрочено</div>
                </div>
                <div class="kpi-trend down" style="display: none;">
                    <i class="fas fa-arrow-down"></i> <span class="trend-value"></span>
                </div>
            </div>
        </div>

        <!-- Статус проектов (теперь на всю ширину) -->
        <div class="charts-grid" style="grid-template-columns: 1fr;">
            <!-- Статус проектов -->
            <div class="chart-card">
                <h3><i class="fas fa-chart-pie"></i> Статус проектов</h3>
                <div class="chart-container" id="projects-status-chart">
                    <div class="pie-chart">
                        <!-- Динамически генерируется через JS -->
                    </div>
                    <div class="chart-legend" id="projects-legend">
                        <!-- Динамически генерируется -->
                    </div>
                </div>
            </div>
        </div>

        <!-- Динамика по месяцам и последние задачи -->
        <div class="bottom-grid">
            <div class="chart-card wide">
                <h3><i class="fas fa-chart-line"></i> Динамика выполнения задач</h3>
                <div class="line-chart" id="monthly-dynamics">
                    <div class="line-chart-bars" id="monthly-bars">
                        <!-- Динамически генерируется -->
                    </div>
                </div>
            </div>
            
            <div class="recent-tasks-card">
                <h3><i class="fas fa-list"></i> Последние задачи</h3>
                <div class="task-list" id="recent-tasks-list">
                    <!-- Динамически генерируется -->
                </div>
            </div>
        </div>
    </div>
</body>
</html>

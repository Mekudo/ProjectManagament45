<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/project-management/ProjectManagement.Frontend/css/components/pages/customers.css">
    <script src="/project-management/ProjectManagement.Frontend/js/pages/customer.js" defer></script>
    <script src="/project-management/ProjectManagement.Frontend/js/auth/authUI.js" defer></script>
    <title>Заказчики</title>
</head>
<body>
<div class="customers-container">
    <!-- Заголовок с иконкой и действиями -->
    <div class="customers-header">
        <div class="header-title">
            <div class="title-icon">
                <i class="fas fa-handshake"></i>
            </div>
            <div class="title-text">
                <h2>Заказчики</h2>
                <span class="subtitle">Управление компаниями и контактами</span>
            </div>
        </div>
        <div class="header-actions">
            <button class="btn btn-outline" onclick="exportCustomers()">
                <i class="fas fa-download"></i> Экспорт
            </button>
            <button class="btn btn-primary" onclick="openAddCustomerModal()">
                <i class="fas fa-plus"></i> Новый заказчик
            </button>
        </div>
    </div>

    <!-- Панель фильтрации -->
    <div class="filter-panel">
        <div class="filter-group">
            <label><i class="fas fa-calendar-alt"></i> Дата создания:</label>
            <select id="dateFilter" onchange="applyFilters()">
                <option value="all">Все время</option>
                <option value="today">Сегодня</option>
                <option value="week">Последние 7 дней</option>
                <option value="month">Последние 30 дней</option>
                <option value="quarter">Последние 3 месяца</option>
                <option value="year">Последний год</option>
            </select>
        </div>
        <div class="filter-group">
            <label><i class="fas fa-sort"></i> Сортировка:</label>
            <select id="sortFilter" onchange="applyFilters()">
                <option value="name_asc">По названию (А-Я)</option>
                <option value="name_desc">По названию (Я-А)</option>
                <option value="date_desc">Сначала новые</option>
                <option value="date_asc">Сначала старые</option>
            </select>
        </div>
        <div class="filter-group">
            <label><i class="fas fa-filter"></i> Показывать:</label>
            <select id="statusFilter" onchange="applyFilters()">
                <option value="all">Все заказчики</option>
                <option value="withPhone">С телефоном</option>
                <option value="withEmail">С email</option>
                <option value="withInn">С ИНН</option>
                <option value="withOgrn">С ОГРН</option>
            </select>
        </div>
        <button class="btn-reset" onclick="resetFilters()">
            <i class="fas fa-undo-alt"></i> Сброс
        </button>
    </div>

    <!-- Статистика -->
    <div class="stats-row">
        <div class="stat-item">
            <span class="stat-value" id="totalCustomers">0</span>
            <span class="stat-label">Всего</span>
        </div>
        <div class="stat-item">
            <span class="stat-value" id="todayCustomers">0</span>
            <span class="stat-label">За сегодня</span>
        </div>
        <div class="stat-item">
            <span class="stat-value" id="weekCustomers">0</span>
            <span class="stat-label">За неделю</span>
        </div>
        <div class="stat-item">
            <span class="stat-value" id="monthCustomers">0</span>
            <span class="stat-label">За месяц</span>
        </div>
    </div>
    
    <div class="table-container">
        <div class="table-header">
            <div class="search-section">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="customerSearch" placeholder="Поиск по названию, ФИО, ИНН, телефону, email..." oninput="searchCustomers()">
                </div>
            </div>
            <div class="display-options">
                <span class="rows-info">
                    <i class="fas fa-list"></i>
                    <select id="rowsPerPage" onchange="changeRowsPerPage(this.value)">
                        <option value="10">10 записей</option>
                        <option value="25">25 записей</option>
                        <option value="50">50 записей</option>
                        <option value="100">100 записей</option>
                    </select>
                </span>
            </div>
        </div>

        <div class="table-wrapper">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>№</th>
                        <th><i class="fas fa-building"></i> Организация</th>
                        <th><i class="fas fa-user-tie"></i> ФИО</th>
                        <th><i class="fas fa-id-card"></i> ИНН</th>
                        <th><i class="fas fa-qrcode"></i> ОГРН</th>
                        <th><i class="fas fa-phone-alt"></i> Телефон</th>
                        <th><i class="fas fa-envelope"></i> Email</th>
                        <th><i class="fas fa-cog"></i> Действия</th>
                    </tr>
                </thead>
                <tbody id="customersTableBody">
                    <tr><td colspan="8" class="loading">
                        <div class="spinner"></div>
                        <span>Загрузка заказчиков...</span>
                    </td></tr>
                </tbody>
            </table>
        </div>

        <!-- Пагинация -->
        <div class="table-footer">
            <div class="pagination-info">
                <span id="showingFrom">1</span> - <span id="showingTo">10</span> из <span id="totalItems">0</span>
            </div>
            <div class="pagination">
                <button class="page-btn" onclick="prevPage()" id="prevPage" disabled>
                    <i class="fas fa-chevron-left"></i>
                </button>
                <div class="page-numbers" id="pageNumbers"></div>
                <button class="page-btn" onclick="nextPage()" id="nextPage">
                    <i class="fas fa-chevron-right"></i>
                </button>
            </div>
            <div class="pagination-info-mobile">
                Страница <span id="currentPage">1</span> из <span id="totalPages">1</span>
            </div>
        </div>
    </div>
</div>

</body>
</html>

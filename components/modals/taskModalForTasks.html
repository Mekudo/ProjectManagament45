<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управление задачей</title>
    <link rel="stylesheet" href="/project-management/ProjectManagement.Frontend/css/components/modals/task.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="modal-overlay" id="task-modal-for-tasks-wrapper">
        <div class="modal-content modal-lg">
            <div class="modal-header">
                <h2 id="task-modal-for-tasks-title"><i class="fas fa-tasks"></i> Создание задачи</h2>
                <button class="close-modal" onclick="closeModal('task-modal-for-tasks-wrapper')">&times;</button>
            </div>
            
            <form id="task-form-for-tasks" onsubmit="saveTaskFromTasks(event)">
                <input type="hidden" id="task-id-for-tasks">
                <input type="hidden" id="task-author-id-for-tasks">

                <div class="form-group">
                    <label>Проект <span class="required">*</span></label>
                    <select id="task-project-select-for-tasks" class="form-control" required onchange="onProjectChangeForTasks()">
                        <option value="">Выберите проект</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Название задачи <span class="required">*</span></label>
                    <input type="text" id="task-name-for-tasks" placeholder="Введите название задачи" required maxlength="100">
                </div>

                <div class="form-group">
                    <label>Описание</label>
                    <textarea id="task-description-for-tasks" placeholder="Введите описание задачи" rows="4"></textarea>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Исполнитель <span class="required">*</span></label>
                        <select id="task-executor-select-for-tasks" class="form-control" required disabled>
                            <option value="">Сначала выберите проект</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Статус <span class="required">*</span></label>
                        <select id="task-status-select-for-tasks" class="form-control" required disabled>
                            <option value="">Сначала выберите проект</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Родительская задача</label>
                        <select id="task-parent-select-for-tasks" class="form-control" disabled>
                            <option value="">Сначала выберите проект</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Дата начала</label>
                        <input type="date" id="task-start-date-for-tasks" class="form-control">
                    </div>
                    <div class="form-group">
                        <label>Дата окончания</label>
                        <input type="date" id="task-end-date-for-tasks" class="form-control">
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-submit btn-primary">
                        <i class="fas fa-save"></i> Сохранить
                    </button>
                    <button type="button" class="btn-submit btn-secondary" onclick="closeModal('task-modal-for-tasks-wrapper')">
                        <i class="fas fa-times"></i> Отмена
                    </button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Выбор периода</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="modal-overlay" id="select-period-wrapper">
        <div class="modal-content">
            <div class="modal-header">
                <h2><i class="fas fa-calendar-alt"></i> Выбор отчетного периода</h2>
                <button class="close-modal" onclick="closeModal('select-period-wrapper')">&times;</button>
            </div>
            
            <form id="select-period-form" onsubmit="handleSelectPeriod(event)">
                <!-- Быстрый выбор периода -->
                <div class="form-group">
                    <label>Быстрый выбор:</label>
                    <div class="quick-period-buttons">
                        <button type="button" class="btn-quick-period" onclick="setQuickPeriod('today')">Сегодня</button>
                        <button type="button" class="btn-quick-period" onclick="setQuickPeriod('week')">Неделя</button>
                        <button type="button" class="btn-quick-period" onclick="setQuickPeriod('month')">Месяц</button>
                        <button type="button" class="btn-quick-period" onclick="setQuickPeriod('quarter')">Квартал</button>
                        <button type="button" class="btn-quick-period" onclick="setQuickPeriod('year')">Год</button>
                    </div>
                </div>

                <!-- Произвольный период -->
                <div class="period-custom">
                    <div class="form-group">
                        <label>Тип периода:</label>
                        <select id="period-type" onchange="toggleCustomPeriod()">
                            <option value="custom">Произвольный</option>
                            <option value="month">За месяц</option>
                            <option value="quarter">За квартал</option>
                            <option value="year">За год</option>
                        </select>
                    </div>

                    <div id="custom-period-fields">
                        <div class="period-row">
                            <div class="form-group period-field">
                                <label><i class="fas fa-calendar"></i> Дата начала</label>
                                <input type="date" id="period-start" class="period-input">
                            </div>
                            <div class="form-group period-field">
                                <label><i class="fas fa-calendar-check"></i> Дата окончания</label>
                                <input type="date" id="period-end" class="period-input">
                            </div>
                        </div>
                    </div>

                    <div id="month-select-fields" style="display: none;">
                        <div class="form-group">
                            <label>Выберите месяц:</label>
                            <select id="select-month">
                                <option value="1">Январь</option>
                                <option value="2">Февраль</option>
                                <option value="3">Март</option>
                                <option value="4">Апрель</option>
                                <option value="5">Май</option>
                                <option value="6">Июнь</option>
                                <option value="7">Июль</option>
                                <option value="8">Август</option>
                                <option value="9">Сентябрь</option>
                                <option value="10">Октябрь</option>
                                <option value="11">Ноябрь</option>
                                <option value="12">Декабрь</option>
                            </select>
                        </div>
                    </div>

                    <div id="quarter-select-fields" style="display: none;">
                        <div class="form-group">
                            <label>Выберите квартал:</label>
                            <select id="select-quarter">
                                <option value="1">I квартал (Янв - Март)</option>
                                <option value="2">II квартал (Апр - Июнь)</option>
                                <option value="3">III квартал (Июль - Сент)</option>
                                <option value="4">IV квартал (Окт - Дек)</option>
                            </select>
                        </div>
                    </div>

                    <div id="year-select-fields" style="display: none;">
                        <div class="form-group">
                            <label>Выберите год:</label>
                            <select id="select-year"></select>
                        </div>
                    </div>
                </div>

                <!-- Дополнительные настройки -->
                <div class="form-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="include-weekends">
                        <span>Включить выходные в расчет</span>
                    </label>
                </div>

                <div class="form-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="compare-with-previous">
                        <span>Сравнить с предыдущим периодом</span>
                    </label>
                </div>

                <!-- Кнопки действий -->
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('select-period-wrapper')">
                        Отмена
                    </button>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-check"></i> Применить период
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Заполняем список годов при загрузке
        document.addEventListener('DOMContentLoaded', function() {
            const yearSelect = document.getElementById('select-year');
            const currentYear = new Date().getFullYear();
            
            for (let year = currentYear - 5; year <= currentYear + 2; year++) {
                const option = document.createElement('option');
                option.value = year;
                option.textContent = year;
                if (year === currentYear) option.selected = true;
                yearSelect.appendChild(option);
            }
            
            // Устанавливаем даты по умолчанию
            const today = new Date();
            const startOfMonth = new Date(today.getFullYear(), today.getMonth(), 1);
            const endOfMonth = new Date(today.getFullYear(), today.getMonth() + 1, 0);
            
            document.getElementById('period-start').value = formatDate(startOfMonth);
            document.getElementById('period-end').value = formatDate(today);
        });
        
        function formatDate(date) {
            const d = new Date(date);
            let month = '' + (d.getMonth() + 1);
            let day = '' + d.getDate();
            const year = d.getFullYear();
            
            if (month.length < 2) month = '0' + month;
            if (day.length < 2) day = '0' + day;
            
            return [year, month, day].join('-');
        }
        
        function toggleCustomPeriod() {
            const type = document.getElementById('period-type').value;
            
            document.getElementById('custom-period-fields').style.display = type === 'custom' ? 'block' : 'none';
            document.getElementById('month-select-fields').style.display = type === 'month' ? 'block' : 'none';
            document.getElementById('quarter-select-fields').style.display = type === 'quarter' ? 'block' : 'none';
            document.getElementById('year-select-fields').style.display = type === 'year' ? 'block' : 'none';
        }
        
        function setQuickPeriod(period) {
            const today = new Date();
            let startDate = new Date();
            let endDate = new Date();
            
            switch(period) {
                case 'today':
                    startDate = today;
                    endDate = today;
                    break;
                case 'week':
                    startDate = new Date(today.setDate(today.getDate() - 7));
                    endDate = new Date();
                    break;
                case 'month':
                    startDate = new Date(today.setMonth(today.getMonth() - 1));
                    endDate = new Date();
                    break;
                case 'quarter':
                    startDate = new Date(today.setMonth(today.getMonth() - 3));
                    endDate = new Date();
                    break;
                case 'year':
                    startDate = new Date(today.setFullYear(today.getFullYear() - 1));
                    endDate = new Date();
                    break;
            }
            
            document.getElementById('period-start').value = formatDate(startDate);
            document.getElementById('period-end').value = formatDate(endDate);
            document.getElementById('period-type').value = 'custom';
            toggleCustomPeriod();
        }
        
        function handleSelectPeriod(event) {
            event.preventDefault();
            
            const periodData = {
                type: document.getElementById('period-type').value,
                startDate: document.getElementById('period-start').value,
                endDate: document.getElementById('period-end').value,
                includeWeekends: document.getElementById('include-weekends').checked,
                compareWithPrevious: document.getElementById('compare-with-previous').checked
            };
            
            if (periodData.type !== 'custom') {
                // Здесь логика расчета дат для месяца/квартала/года
                const today = new Date();
                switch(periodData.type) {
                    case 'month':
                        const month = document.getElementById('select-month').value;
                        periodData.startDate = formatDate(new Date(today.getFullYear(), month - 1, 1));
                        periodData.endDate = formatDate(new Date(today.getFullYear(), month, 0));
                        break;
                    case 'quarter':
                        const quarter = document.getElementById('select-quarter').value;
                        const quarterStartMonth = (quarter - 1) * 3;
                        periodData.startDate = formatDate(new Date(today.getFullYear(), quarterStartMonth, 1));
                        periodData.endDate = formatDate(new Date(today.getFullYear(), quarterStartMonth + 3, 0));
                        break;
                    case 'year':
                        const year = document.getElementById('select-year').value;
                        periodData.startDate = formatDate(new Date(year, 0, 1));
                        periodData.endDate = formatDate(new Date(year, 11, 31));
                        break;
                }
            }
            
            console.log('Выбранный период:', periodData);
            
            // Показываем загрузку
            const submitBtn = event.target.querySelector('.btn-primary');
            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Применение...';
            submitBtn.disabled = true;
            
            // Имитация применения периода
            setTimeout(() => {
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
                
                console.log('Применяем период:', periodData);
                
                // Закрываем модалку
                closeModal('select-period-wrapper');
                
                // Показываем сообщение
                alert(`✅ Период применен: ${periodData.startDate} - ${periodData.endDate}`);
                
            }, 1000);
        }
    </script>
</body>
</html>

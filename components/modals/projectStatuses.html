<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управление статусами задач</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="modal-overlay" id="project-statuses-wrapper">
        <div class="modal-content modal-lg">
            <div class="modal-header">
                <h2><i class="fas fa-tasks"></i> Управление статусами задач</h2>
                <button class="close-modal" onclick="closeModal('project-statuses-wrapper')">&times;</button>
            </div>
            
            <div class="modal-body">
                <!-- Информация о проекте -->
                <div class="project-info-header">
                    <h3 id="status-project-name-display"></h3>
                    <p id="status-project-num-display"></p>
                </div>

                <!-- Форма добавления нового статуса -->
                <div class="add-status-form">
                    <h4>Добавить новый статус</h4>
                    <div class="form-row">
                        <div class="form-group" style="flex: 2;">
                            <label for="new-status-name">Название статуса</label>
                            <input type="text" id="new-status-name" placeholder="Например: В работе, На проверке, Готово" maxlength="50">
                        </div>
                        <div class="form-group" style="flex: 1;">
                            <label for="new-status-order">Позиция на доске</label>
                            <input type="number" id="new-status-order" placeholder="от 1" min="1" value="1">
                        </div>
                        <div class="form-group" style="align-self: flex-end;">
                            <button class="btn-add-status" onclick="addProjectStatus()">
                                <i class="fas fa-plus"></i> Добавить
                            </button>
                        </div>
                    </div>
                </div>
                <!-- Список статусов -->
                <div class="statuses-list-header">
                    <h4><i class="fas fa-list"></i> Статусы проекта</h4>
                    <small class="text-muted">Порядок определяет последовательность на доске задач</small>
                </div>
                
                <div class="statuses-list" id="project-statuses-list">
                    <div class="loading-statuses">
                        <i class="fas fa-spinner fa-spin"></i>
                        <p>Загрузка статусов...</p>
                    </div>
                </div>
            </div>

            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="closeModal('project-statuses-wrapper')">
                    <i class="fas fa-times"></i> Закрыть
                </button>
            </div>
        </div>
    </div>
</body>
</html>

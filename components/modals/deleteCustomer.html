<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Удаление заказчика</title>
    <link rel="stylesheet" href="/project-management/ProjectManagement.Frontend/css/components/modals/deleteCustomer.css">
    <script src="/project-management/ProjectManagement.Frontend/js/pages/customer.js" defer></script>
    <script src="/project-management/ProjectManagement.Frontend/js/auth/authUI.js" defer></script>
</head>
<body>
    <div class="modal-overlay" id="delete-customer-wrapper">
        <div class="modal-content delete-modal">
            <div class="modal-header">
                <h2>Удаление информации о заказчике</h2>
                <button class="close-modal" onclick="closeModal('delete-customer-wrapper')">&times;</button>
            </div>
            
            <input type="hidden" id="delete-customer-id">
            
            <div class="modal-body">
                <div class="delete-icon">🗑️</div>
                <p class="delete-question">Вы действительно хотите удалить информацию о заказчике?</p>
                <p class="delete-warning">Это действие нельзя отменить.</p>
            </div>
            
            <div class="modal-footer">
                <button class="btn btn-danger" onclick="deleteCustomer(document.getElementById('delete-customer-id').value)">Да, удалить</button>
                <button class="btn btn-secondary" onclick="closeModal('delete-customer-wrapper')">Нет, отмена</button>
            </div>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Редактирование заказчика</title>
    <script src="/project-management/ProjectManagement.Frontend/js/auth/authUI.js" defer></script>
    <script src="/project-management/ProjectManagement.Frontend/js/pages/customer.js" defer></script>
</head>
<body>
    <div class="modal-overlay" id="edit-customer-wrapper">
        <div class="modal-content">
            <div class="modal-header">
                <h2>✏️ Редактирование информации о заказчике</h2>
                <button class="close-modal" onclick="closeModal('edit-customer-wrapper')">&times;</button>
            </div>
            
            <!-- Убираем form, оставляем div -->
            <div class="edit-info-grid">
                <!-- ID заказчика (скрытое поле) -->
                <input type="hidden" id="edit-customer-id">
                
                <!-- Организация -->
                <div class="edit-info-item">
                    <i class="fas fa-building"></i>
                    <span class="edit-info-label">Наименование организации:</span>
                    <input type="text" id="edit-customer" class="edit-info-input" placeholder='Например: ООО "Ромашка"'>
                </div>
                
                <!-- Ответственное лицо -->
                <div class="edit-info-item">
                    <i class="fas fa-user-tie"></i>
                    <span class="edit-info-label">ФИО ответственного лица</span>
                    <input type="text" id="edit-fio-customer" class="edit-info-input" placeholder="Например: Иванов Иван Иванович">
                </div>
                
                <!-- ИНН -->
                <div class="edit-info-item">
                    <i class="fas fa-wallet"></i>
                    <span class="edit-info-label">ИНН:</span>
                    <input type="text" id="edit-inn" class="edit-info-input" placeholder="10 или 12 цифр, например: 7701123456">
                </div>

                <!-- ОГРН -->
                <div class="edit-info-item">
                    <i class="fas fa-wallet"></i>
                    <span class="edit-info-label">ОГРН:</span>
                    <input type="text" id="edit-ogrn" class="edit-info-input" placeholder="13 или 15 цифр, например: 1027700132194">
                </div>
                
                <!-- Номер телефона -->
                <div class="edit-info-item">
                    <i class="fas fa-calendar-alt"></i>
                    <span class="edit-info-label">Номер телефона:</span>
                    <input type="text" id="edit-phone-number" class="edit-info-input" placeholder="+7 (999) 999-99-99">
                </div>
                
                <!-- Электронная почта -->
                <div class="edit-info-item">
                    <i class="fas fa-calendar-check"></i>
                    <span class="edit-info-label">Электронная почта:</span>
                    <input type="email" id="edit-email" class="edit-info-input" placeholder="company@example.ru">
                </div>
            </div>

            <div class="modal-footer">
                <button type="button" class="btn btn-primary" onclick="updateCustomerFromModal()">Сохранить изменения</button>
                <button type="button" class="btn btn-secondary" onclick="closeModal('edit-customer-wrapper')">Отмена</button>
            </div>
        </div>
    </div>
</body>
</html>
